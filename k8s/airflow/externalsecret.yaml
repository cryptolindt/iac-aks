# ExternalSecret that syncs the storage account credentials from Azure Key Vault
# into a Kubernetes Secret consumed by the Azure Blob CSI driver for the log PV.
#
# Variables substituted by envsubst before applying:
#   AKS_AIRFLOW_NAMESPACE
#   AKS_AIRFLOW_LOGS_STORAGE_SECRET_NAME  (default: storage-account-credentials)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: airflow-aks-azure-logs-secrets
  namespace: ${AKS_AIRFLOW_NAMESPACE}
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: SecretStore
    name: azure-store
  target:
    name: ${AKS_AIRFLOW_LOGS_STORAGE_SECRET_NAME}
    creationPolicy: Owner
  data:
    - secretKey: azurestorageaccountname
      remoteRef:
        key: AKS-AIRFLOW-LOGS-STORAGE-ACCOUNT-NAME
    - secretKey: azurestorageaccountkey
      remoteRef:
        key: AKS-AIRFLOW-LOGS-STORAGE-ACCOUNT-KEY
