# ESO SecretStore that reads secrets from Azure Key Vault using workload identity.
# The serviceAccountRef points to the SA annotated with the managed identity client ID.
#
# Variables substituted by envsubst before applying:
#   KEYVAULT_URL              – from: az deployment sub show ... --query properties.outputs.keyVaultUri.value
#   SERVICE_ACCOUNT_NAME
#   AKS_AIRFLOW_NAMESPACE
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: azure-store
  namespace: ${AKS_AIRFLOW_NAMESPACE}
spec:
  provider:
    azurekv:
      authType: WorkloadIdentity
      vaultUrl: "${KEYVAULT_URL}"
      serviceAccountRef:
        name: ${SERVICE_ACCOUNT_NAME}
