# Service account for Airflow pods and the External Secrets Operator.
# The azure.workload.identity/client-id annotation binds this SA to the
# user-assigned managed identity, enabling pod-level Azure AD authentication.
#
# Variables substituted by envsubst before applying:
#   IDENTITY_CLIENT_ID  – from: az deployment sub show ... --query properties.outputs.identityClientId.value
#   TENANT_ID           – from: az account show --query tenantId -o tsv
#   SERVICE_ACCOUNT_NAMESPACE
#   SERVICE_ACCOUNT_NAME
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ${SERVICE_ACCOUNT_NAME}
  namespace: ${SERVICE_ACCOUNT_NAMESPACE}
  annotations:
    azure.workload.identity/client-id: "${IDENTITY_CLIENT_ID}"
    azure.workload.identity/tenant-id: "${TENANT_ID}"
